<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="X-UA-Compatible" content="IE=edge"><title> Monkey压力测试 · Blog</title><meta name="description" content="Monkey压力测试 - Vito"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="/favicon.png"><link rel="stylesheet" href="/css/apollo.css"><link rel="search" type="application/opensearchdescription+xml" href="https://vito-l.github.io/atom.xml" title="Blog"></head><body><div class="wrap"><header><a href="/" class="logo-link"><img src="/favicon.png" alt="logo"></a><ul class="nav nav-list"><li class="nav-list-item"><a href="/" target="_self" class="nav-list-link">BLOG</a></li><li class="nav-list-item"><a href="/archives/" target="_self" class="nav-list-link">ARCHIVE</a></li><li class="nav-list-item"><a href="https://github.com/vito-L" target="_blank" class="nav-list-link">GITHUB</a></li><li class="nav-list-item"><a href="/atom.xml" target="_self" class="nav-list-link">RSS</a></li></ul></header><main class="container"><div class="post"><article class="post-block"><h1 class="post-title">Monkey压力测试</h1><div class="post-info">2017年5月27日</div><div class="post-content"><p>指定包名启动monkey测试</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">$ adb shell monkey -p your.package.name -v 500</div></pre></td></tr></table></figure>
<p>seed <strong>回归测试</strong> 用的到</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">$ adb shell monkey -p your.package.name <span class="_">-s</span> 100 -v 500</div></pre></td></tr></table></figure>
<a id="more"></a>
<p>指定执行速度</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">$ adb shell monkey -p your.package.name --throttle 1000 -v 500 //1s执行1次</div></pre></td></tr></table></figure>
<p>调整触摸事件的百分比 </p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">$ adb shell monkey -p your.package.name --pct-touch 100 -v 100</div></pre></td></tr></table></figure>
