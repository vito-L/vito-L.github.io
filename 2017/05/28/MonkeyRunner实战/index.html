<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="X-UA-Compatible" content="IE=edge"><title> MonkeyRunner实战 · Blog</title><meta name="description" content="MonkeyRunner实战 - Vito"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="/favicon.png"><link rel="stylesheet" href="/css/apollo.css"><link rel="search" type="application/opensearchdescription+xml" href="https://vito-l.github.io/atom.xml" title="Blog"></head><body><div class="wrap"><header><a href="/" class="logo-link"><img src="/favicon.png" alt="logo"></a><ul class="nav nav-list"><li class="nav-list-item"><a href="/" target="_self" class="nav-list-link">BLOG</a></li><li class="nav-list-item"><a href="/archives/" target="_self" class="nav-list-link">ARCHIVE</a></li><li class="nav-list-item"><a href="https://github.com/vito-L" target="_blank" class="nav-list-link">GITHUB</a></li><li class="nav-list-item"><a href="/atom.xml" target="_self" class="nav-list-link">RSS</a></li></ul></header><main class="container"><div class="post"><article class="post-block"><h1 class="post-title">MonkeyRunner实战</h1><div class="post-info">2017年5月28日</div><div class="post-content"><p>实验目标：打开豌豆荚搜索软件再返回主页</p>
<p>代码如下：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div></pre></td><td class="code"><pre><div class="line"><span class="comment">#!/usr/bin/env python3</span></div><div class="line"><span class="comment"># coding:utf-8</span></div><div class="line"><span class="keyword">from</span> com.android.monkeyrunner <span class="keyword">import</span> MonkeyRunner,MonkeyDevice,MonkeyImage</div><div class="line"></div><div class="line"><span class="comment"># connect Device</span></div><div class="line">device = MonkeyRunner.waitForConnection(<span class="number">3</span>,<span class="string">"emulator-5554"</span>)  <span class="comment"># 3是超时时间，emulator-5554是设备名称</span></div><div class="line"></div><div class="line"><span class="comment"># start app</span></div><div class="line">device.startActivity(<span class="string">"com.wandoujia.phoenix2/com.wandoujia.jupiter.activity.HomeActivity"</span>)</div><div class="line"></div><div class="line">MonkeyRunner.sleep(<span class="number">10</span>)</div><div class="line"></div><div class="line"><span class="comment"># click search</span></div><div class="line">device.touch(<span class="number">220</span>,<span class="number">235</span>,<span class="string">"DOWN_AND_UP"</span>)</div><div class="line">MonkeyRunner.sleep(<span class="number">2</span>)</div><div class="line"></div><div class="line"><span class="comment"># input keywords</span></div><div class="line">device.type(<span class="string">"qq"</span>)</div><div class="line">MonkeyRunner.sleep(<span class="number">2</span>)</div><div class="line"></div><div class="line"><span class="comment"># click enter</span></div><div class="line">device.press(<span class="string">"KEYCODE_ENTER"</span>,<span class="string">"DOWN_AND_UP"</span>)</div><div class="line">MonkeyRunner.sleep(<span class="number">2</span>)</div><div class="line"></div><div class="line"><span class="comment"># click search button</span></div><div class="line">device.touch(<span class="number">603</span>,<span class="number">79</span>,<span class="string">"DOWN_AND_UP"</span>)</div><div class="line">MonkeyRunner.sleep(<span class="number">4</span>)</div><div class="line"></div><div class="line"><span class="comment"># Snapshot</span></div><div class="line">image = device.takeSnapshot()</div><div class="line">image.writeToFile(<span class="string">'./test.png'</span>,<span class="string">'png'</span>)</div><div class="line"></div><div class="line"><span class="comment"># clear and back</span></div><div class="line">device.touch(<span class="number">38</span>,<span class="number">78</span>,<span class="string">"DOWN_AND_UP"</span>)</div></pre></td></tr></table></figure>
<a id="more"></a>
<p>在终端上执行：</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">$ monkeyrunner demo.py</div></pre></td></tr></table></figure>
<p>得到的截图如下：</p>
<p><img src="demo.png" alt="snapshot"> </p>
